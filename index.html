    // ============================================
    // 저장된 템플릿 페이지 초기화
    // ============================================
    pageInits["tpl-saved-templates"] = () => {
      const STORAGE_KEY = "bizpt_traffic_scenarios_v1";
      const DRAFT_KEY = "bizpt_traffic_draft_v1";
      const SORT_KEY = "bizpt_traffic_sort_v1";
      let sortMode = localStorage.getItem(SORT_KEY) || "recent";

      function loadAll() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
        catch (e) { return []; }
      }
      function saveAll(list) {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); return true; }
        catch (e) { alert("저장 실패: " + e.message); return false; }
      }
      function fmt(n) {
        if (!isFinite(n) || isNaN(n)) return "—";
        return Math.ceil(n).toLocaleString("ko-KR");
      }
      function computeFunnel(s) {
        const aov = +s.aov || 0;
        const days = +s.days || 30;
        const revenue = +s.revenue || 0;
        const q = aov > 0 ? revenue / aov : 0;
        const daily = days > 0 ? q / days : 0;
        const dLanding = s.paidRate > 0 ? daily / (s.paidRate / 100) : 0;
        const dKey = s.clickRate > 0 ? dLanding / (s.clickRate / 100) : 0;
        const dPulling = s.keyRate > 0 ? dKey / (s.keyRate / 100) : 0;
        const landing = s.paidRate > 0 ? q / (s.paidRate / 100) : 0;
        const keyViews = s.clickRate > 0 ? landing / (s.clickRate / 100) : 0;
        const pullingViews = s.keyRate > 0 ? keyViews / (s.keyRate / 100) : 0;
        const viewsPer = +s.viewsPerVid > 0 ? +s.viewsPerVid : 1000;
        const videoCount = viewsPer > 0 ? pullingViews / viewsPer : 0;
        return { q, daily, dLanding, dKey, dPulling, videoCount, days, aov, revenue, viewsPer };
      }

      function renderList() {
        const list = loadAll();
        const sorted = [...list];
        if (sortMode === "name") {
          sorted.sort((a, b) => (a.name || "").localeCompare(b.name || "", "ko"));
        } else {
          sorted.sort((a, b) => new Date(b.savedAt || 0) - new Date(a.savedAt || 0));
        }
        document.querySelectorAll(".st-sort-btn").forEach(b => {
          b.classList.toggle("is-active", b.dataset.sort === sortMode);
        });
        const countEl = document.getElementById("st-count");
        if (countEl) countEl.textContent = list.length ? `· ${list.length}개` : "";

        const box = document.getElementById("st-list");
        if (!box) return;
        if (!sorted.length) {
          box.innerHTML = `<div class="tc-empty">저장된 템플릿이 없습니다. <a href="#traffic-calculator" onclick="event.preventDefault(); navigate('traffic-calculator');">트래픽 계산기</a>의 도식에서 이름을 입력하고 <strong>도식 저장</strong>을 눌러 보세요.</div>`;
          return;
        }

        box.innerHTML = sorted.map(s => {
          const f = computeFunnel(s);
          const origIdx = list.findIndex(x => x.name === s.name);
          const date = s.savedAt ? new Date(s.savedAt).toLocaleString("ko-KR", { year: "2-digit", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" }) : "";
          const revenueKor = ((f.revenue) / 10000).toLocaleString("ko-KR") + "만원";
          const aovKor = f.aov.toLocaleString("ko-KR") + "원";
          const memoHtml = s.memo ? `<div class="st-card__memo">${escapeHtml(s.memo)}</div>` : "";
          return `<div class="st-card" data-i="${origIdx}">
            <div class="st-card__head">
              <div>
                <div class="st-card__name">${escapeHtml(s.name || "(무제)")}</div>
                <div class="st-card__meta">저장 ${escapeHtml(date)}</div>
              </div>
              <div class="st-card__actions">
                <button class="tc-btn" data-act="load" data-i="${origIdx}">불러오기</button>
                <button class="tc-btn" data-act="dup" data-i="${origIdx}">복제</button>
                <button class="tc-btn tc-btn--danger" data-act="del" data-i="${origIdx}">삭제</button>
              </div>
            </div>
            <div class="st-card__kpis">
              <div><span class="tc-hint">목표 매출</span><strong>${revenueKor}</strong></div>
              <div><span class="tc-hint">객단가</span><strong>${aovKor}</strong></div>
              <div><span class="tc-hint">판매 기간</span><strong>${f.days}일</strong></div>
              <div><span class="tc-hint">필요 구매 (Q)</span><strong>${fmt(f.q)}명</strong></div>
              <div><span class="tc-hint">하루 필요 구매</span><strong>${fmt(f.daily)}명/일</strong></div>
              <div><span class="tc-hint">풀링 필요 영상</span><strong>${fmt(f.videoCount)}개</strong></div>
            </div>
            <div class="tc-diagram">
              <div class="tc-diagram__stage tc-diagram__stage--start">
                <div class="tc-diagram__head"><div class="tc-diagram__num">①</div><div class="tc-diagram__label">하루 필요 구매</div></div>
                <div class="tc-diagram__value">${fmt(f.daily)}<span class="tc-diagram__unit">명/일</span></div>
              </div>
              <div class="tc-diagram__arrow">
                <div class="tc-diagram__rate">÷ ${s.paidRate}%</div>
                <div class="tc-diagram__rate-sub">구매 전환율</div>
                <div class="tc-diagram__chevron">→</div>
              </div>
              <div class="tc-diagram__stage">
                <div class="tc-diagram__head"><div class="tc-diagram__num">②</div><div class="tc-diagram__label">하루 랜딩 접속</div></div>
                <div class="tc-diagram__value">${fmt(f.dLanding)}<span class="tc-diagram__unit">명/일</span></div>
              </div>
              <div class="tc-diagram__arrow">
                <div class="tc-diagram__rate">÷ ${s.clickRate}%</div>
                <div class="tc-diagram__rate-sub">링크 클릭률</div>
                <div class="tc-diagram__chevron">→</div>
              </div>
              <div class="tc-diagram__stage">
                <div class="tc-diagram__head"><div class="tc-diagram__num">③</div><div class="tc-diagram__label">하루 키콘텐츠 조회</div></div>
                <div class="tc-diagram__value">${fmt(f.dKey)}<span class="tc-diagram__unit">회/일</span></div>
              </div>
              <div class="tc-diagram__arrow">
                <div class="tc-diagram__rate">÷ ${s.keyRate}%</div>
                <div class="tc-diagram__rate-sub">키콘텐츠 연계율</div>
                <div class="tc-diagram__chevron">→</div>
              </div>
              <div class="tc-diagram__stage tc-diagram__stage--end">
                <div class="tc-diagram__head"><div class="tc-diagram__num">④</div><div class="tc-diagram__label">풀링 필요 시청수</div></div>
                <div class="tc-diagram__value">${fmt(f.dPulling)}<span class="tc-diagram__unit">회/일</span></div>
              </div>
            </div>
            ${memoHtml}
          </div>`;
        }).join("");

        box.querySelectorAll("button[data-act]").forEach(btn => {
          btn.addEventListener("click", () => {
            const idx = +btn.dataset.i;
            const act = btn.dataset.act;
            const cur = loadAll();
            if (act === "load") {
              const s = cur[idx];
              if (!s) return;
              try {
                localStorage.setItem(DRAFT_KEY, JSON.stringify({ ...s, ts: Date.now() }));
              } catch (e) {}
              navigate("traffic-calculator");
            } else if (act === "dup") {
              const s = cur[idx];
              if (!s) return;
              let newName = (s.name || "무제") + " (복사)";
              let n = 2;
              while (cur.some(x => x.name === newName)) { newName = (s.name || "무제") + ` (복사 ${n++})`; }
              const copy = { ...s, name: newName, savedAt: new Date().toISOString() };
              cur.push(copy);
              saveAll(cur); renderList();
            } else if (act === "del") {
              if (!confirm(`"${cur[idx].name}" 템플릿을 삭제할까요?`)) return;
              cur.splice(idx, 1);
              saveAll(cur); renderList();
            }
          });
        });
      }

      document.querySelectorAll(".st-sort-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          sortMode = btn.dataset.sort;
          localStorage.setItem(SORT_KEY, sortMode);
          renderList();
        });
      });

      renderList();
    };

    // ============================================
    // 강의 노트 페이지 초기화 (IndexedDB 기반)
    // ============================================
    pageInits["tpl-lecture-notes"] = () => {
      const DB_NAME = "bizpt-lecture-notes";
      const DB_VERSION = 1;
      const STORE = "notes";
      const SORT_KEY = "bizpt_lecture_notes_sort_v1";

      const g = id => document.getElementById(id);
      const objectUrls = new Set(); // 페이지 이탈 시 정리할 URL들

      // ---------- IndexedDB 헬퍼 ----------
      function openDb() {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open(DB_NAME, DB_VERSION);
          req.onupgradeneeded = () => {
            const db = req.result;
            if (!db.objectStoreNames.contains(STORE)) {
              db.createObjectStore(STORE, { keyPath: "id" });
            }
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      }
      async function dbGetAll() {
        const db = await openDb();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE, "readonly");
          const req = tx.objectStore(STORE).getAll();
          req.onsuccess = () => resolve(req.result || []);
          req.onerror = () => reject(req.error);
          tx.oncomplete = () => db.close();
        });
      }
      async function dbPut(note) {
        const db = await openDb();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE, "readwrite");
          tx.objectStore(STORE).put(note);
          tx.oncomplete = () => { db.close(); resolve(); };
          tx.onerror = () => reject(tx.error);
        });
      }
      async function dbDelete(id) {
        const db = await openDb();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE, "readwrite");
          tx.objectStore(STORE).delete(id);
          tx.oncomplete = () => { db.close(); resolve(); };
          tx.onerror = () => reject(tx.error);
        });
      }

      // ---------- 상태 ----------
      let pendingImages = []; // 새 노트 폼용 임시 이미지
      let inlineEditId = null; // 인라인 편집 중인 노트 id
      let inlineEditImages = []; // 인라인 편집 중인 임시 이미지
      let inlineEditDraft = null; // 재렌더 시 입력값 보존용 (date/title/content)
      let cachedNotes = [];
      let sortMode = localStorage.getItem(SORT_KEY) || "recent"; // recent | date-desc | date-asc
      let searchQuery = "";
      let lbImages = [];
      let lbIdx = 0;

      // ---------- 유틸 ----------
      function uid(prefix) {
        return prefix + "_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);
      }
      function todayStr() {
        const d = new Date();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${d.getFullYear()}-${m}-${day}`;
      }
      function formatDate(iso) {
        if (!iso) return "—";
        try {
          const d = new Date(iso + "T00:00:00");
          return d.toLocaleDateString("ko-KR", { year: "numeric", month: "long", day: "numeric", weekday: "short" });
        } catch (e) { return iso; }
      }
      function fileSize(n) {
        if (n < 1024) return n + " B";
        if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
        return (n / (1024 * 1024)).toFixed(1) + " MB";
      }
      function makeUrl(blob) {
        const url = URL.createObjectURL(blob);
        objectUrls.add(url);
        return url;
      }
      function revokeAllUrls() {
        objectUrls.forEach(u => URL.revokeObjectURL(u));
        objectUrls.clear();
      }
      function status(msg, type) {
        const el = g("ln-form-status");
        if (!el) return;
        el.textContent = msg;
        el.style.color = type === "error" ? "var(--danger)"
                       : type === "warn" ? "var(--warning)"
                       : "var(--success)";
        clearTimeout(status._t);
        if (msg) status._t = setTimeout(() => { el.textContent = ""; }, 2400);
      }

      // ---------- 새 노트 폼 ----------
      function resetForm() {
        pendingImages = [];
        g("ln-date").value = todayStr();
        g("ln-title").value = "";
        g("ln-content").value = "";
        renderPreview();
      }

      function renderPreview() {
        const box = g("ln-preview");
        if (!pendingImages.length) { box.innerHTML = ""; return; }
        box.innerHTML = pendingImages.map((img, i) => `
          <div class="ln-preview__item">
            <img src="${makeUrl(img.blob)}" alt="${escapeHtml(img.name || "")}" />
            <button class="ln-preview__remove" data-rm="${i}" title="제거" aria-label="이미지 제거">×</button>
            <div class="ln-preview__name">${escapeHtml(img.name || "untitled")}</div>
          </div>
        `).join("");
        box.querySelectorAll("[data-rm]").forEach(btn => {
          btn.addEventListener("click", e => {
            e.preventDefault();
            const i = +btn.dataset.rm;
            pendingImages.splice(i, 1);
            renderPreview();
          });
        });
      }

      // ---------- 이미지 추가 ----------
      function addFiles(fileList) {
        const files = [...fileList].filter(f => f && f.type && f.type.startsWith("image/"));
        if (!files.length) return;
        files.forEach(f => {
          pendingImages.push({
            id: uid("img"),
            name: f.name || "pasted-image.png",
            type: f.type,
            size: f.size,
            blob: f,
          });
        });
        renderPreview();
      }

      // ---------- 저장/불러오기/삭제 ----------
      async function saveNote() {
        const date = g("ln-date").value;
        const title = g("ln-title").value.trim();
        const content = g("ln-content").value;

        if (!date) { status("강의 일자를 입력하세요.", "error"); g("ln-date").focus(); return; }
        if (!title && !content && !pendingImages.length) {
          status("제목·내용·이미지 중 하나는 입력하세요.", "error");
          g("ln-title").focus();
          return;
        }

        const now = Date.now();
        const note = { id: uid("note"), date, title, content, images: pendingImages, createdAt: now, updatedAt: now };

        try {
          await dbPut(note);
          status("새 노트가 저장되었습니다");
          resetForm();
          await refresh();
        } catch (e) {
          console.error(e);
          status("저장 실패: " + (e?.message || e), "error");
        }
      }

      async function deleteNote(id) {
        const n = cachedNotes.find(x => x.id === id);
        if (!n) return;
        const label = n.title || formatDate(n.date) || "이 노트";
        if (!confirm(`"${label}" 노트를 삭제할까요? (되돌릴 수 없습니다)`)) return;
        try {
          await dbDelete(id);
          if (inlineEditId === id) { inlineEditId = null; inlineEditImages = []; }
          await refresh();
        } catch (e) {
          alert("삭제 실패: " + (e?.message || e));
        }
      }

      // ---------- 인라인 편집 ----------
      function enterInlineEdit(id) {
        if (inlineEditId && inlineEditId !== id) {
          if (!confirm("다른 노트를 편집 중입니다. 변경사항을 버리고 이 노트로 이동할까요?")) return;
        }
        const note = cachedNotes.find(n => n.id === id);
        if (!note) return;
        inlineEditId = id;
        inlineEditImages = (note.images || []).map(img => ({ ...img }));
        renderList();
        const card = document.querySelector(`.ln-card[data-id="${id}"]`);
        if (card) {
          card.scrollIntoView({ behavior: "smooth", block: "center" });
          card.querySelector(".ln-card__edit-field input[type='text']")?.focus();
        }
      }

      function exitInlineEdit() {
        inlineEditId = null;
        inlineEditImages = [];
        renderList();
      }

      async function saveInlineEdit() {
        const id = inlineEditId;
        if (!id) return;
        const card = document.querySelector(`.ln-card[data-id="${id}"]`);
        if (!card) return;
        const date = card.querySelector(".ln-edit-date").value;
        const title = card.querySelector(".ln-edit-title").value.trim();
        const content = card.querySelector(".ln-edit-content").value;

        if (!date) { alert("강의 일자를 입력하세요."); return; }
        if (!title && !content && !inlineEditImages.length) {
          alert("제목·내용·이미지 중 하나는 입력하세요.");
          return;
        }

        const original = cachedNotes.find(n => n.id === id);
        const now = Date.now();
        const note = {
          ...(original || {}),
          id,
          date, title, content,
          images: inlineEditImages,
          createdAt: original?.createdAt || now,
          updatedAt: now,
        };

        try {
          await dbPut(note);
          inlineEditId = null;
          inlineEditImages = [];
          await refresh();
          status("수정 저장됨");
        } catch (e) {
          console.error(e);
          alert("저장 실패: " + (e?.message || e));
        }
      }

      function addInlineImages(fileList) {
        const files = [...fileList].filter(f => f && f.type && f.type.startsWith("image/"));
        if (!files.length) return;
        files.forEach(f => {
          inlineEditImages.push({
            id: uid("img"),
            name: f.name || "pasted-image.png",
            type: f.type, size: f.size, blob: f,
          });
        });
        renderInlinePreview();
      }

      function renderInlinePreview() {
        const card = document.querySelector(`.ln-card[data-id="${inlineEditId}"]`);
        if (!card) return;
        const box = card.querySelector(".ln-edit-preview");
        if (!box) return;
        box.innerHTML = inlineEditImages.map((img, i) => `
          <div class="ln-preview__item">
            <img src="${makeUrl(img.blob)}" alt="${escapeHtml(img.name || "")}" />
            <button class="ln-preview__remove" data-rm="${i}" title="제거" aria-label="이미지 제거">×</button>
            <div class="ln-preview__name">${escapeHtml(img.name || "untitled")}</div>
          </div>
        `).join("");
        box.querySelectorAll("[data-rm]").forEach(btn => {
          btn.addEventListener("click", e => {
            e.preventDefault();
            const i = +btn.dataset.rm;
            inlineEditImages.splice(i, 1);
            renderInlinePreview();
          });
        });
      }

      // ---------- 검색·정렬 ----------
      function filterAndSort(notes) {
        const q = searchQuery.trim().toLowerCase();
        let arr = notes.slice();
        if (q) {
          arr = arr.filter(n =>
            n.id === inlineEditId || // 편집 중인 카드는 항상 포함
            (n.title || "").toLowerCase().includes(q) ||
            (n.content || "").toLowerCase().includes(q)
          );
        }
        if (sortMode === "date-desc") {
          arr.sort((a, b) => (b.date || "").localeCompare(a.date || "") || (b.createdAt || 0) - (a.createdAt || 0));
        } else if (sortMode === "date-asc") {
          arr.sort((a, b) => (a.date || "").localeCompare(b.date || "") || (a.createdAt || 0) - (b.createdAt || 0));
        } else {
          arr.sort((a, b) => (b.updatedAt || b.createdAt || 0) - (a.updatedAt || a.createdAt || 0));
        }
        return arr;
      }

      function captureInlineDraft() {
        if (!inlineEditId) return;
        const card = document.querySelector(`.ln-card[data-id="${inlineEditId}"]`);
        if (!card) return;
        inlineEditDraft = {
          date: card.querySelector(".ln-edit-date")?.value,
          title: card.querySelector(".ln-edit-title")?.value,
          content: card.querySelector(".ln-edit-content")?.value,
        };
      }

      // ---------- 자동 폭 조절 ----------
      // 기록된 자료(이미지 개수, 본문 라인 길이, 제목 길이)를 기반으로
      // #content의 max-width를 동적으로 계산. 뷰포트 한계 안에서만 확장.
      function adaptContentWidth() {
        const content = document.getElementById("content");
        if (!content || !content.classList.contains("is-wide")) return;

        const vw = window.innerWidth;
        const sidebarW = vw > 900 ? 280 : 0;
        const sidePad = 80;
        const viewportCap = Math.max(720, vw - sidebarW - sidePad);

        // 노트가 비어 있으면 기본값 (좁은 입력 폼만 보일 때)
        const minW = 760;
        const hardCap = 1800;
        let need = minW;

        // 인라인 편집 카드도 고려 (입력 중인 텍스트는 캐시에 없을 수 있음)
        const editCardImgs = inlineEditId ? inlineEditImages.length : 0;
        const editCardContent = (inlineEditDraft?.content || "");
        const editCardTitle = (inlineEditDraft?.title || "");

        const consider = (text, charPx, padding, cap) => {
          if (!text) return;
          const longest = text.split("\n").reduce((m, l) => Math.max(m, l.length), 0);
          const w = longest * charPx + padding;
          need = Math.max(need, Math.min(w, cap));
        };
        const considerImgCount = (count) => {
          if (count <= 0) return;
          const thumbW = 80, gap = 8, cardPad = 60;
          const cols = Math.min(count, 14);
          need = Math.max(need, cardPad + cols * (thumbW + gap));
        };

        cachedNotes.forEach(n => {
          consider(n.content, 9.5, 80, 1500);
          consider(n.title, 11, 240, 1200);
          considerImgCount((n.images || []).length);
        });
        // 편집 중 카드의 작업 중 데이터도 반영
        consider(editCardContent, 9.5, 80, 1500);
        consider(editCardTitle, 11, 240, 1200);
        considerImgCount(editCardImgs);

        const final = Math.min(Math.max(need, minW), viewportCap, hardCap);
        content.style.setProperty("--content-w", final + "px");
      }

      // ---------- 목록 렌더 ----------
      function renderList() {
        captureInlineDraft();
        const box = g("ln-list");
        const list = filterAndSort(cachedNotes);
        const tag = g("ln-count-tag");
        if (tag) tag.textContent = `${cachedNotes.length}개`;

        if (!list.length) {
          if (!cachedNotes.length) {
            box.innerHTML = `
              <div class="ln-empty">
                <div class="ln-empty__icon">📝</div>
                <div>아직 저장된 노트가 없습니다.</div>
                <div style="font-size: 12px; margin-top: 6px; color: var(--text-3);">
                  위 폼에서 첫 강의 노트를 작성해보세요.
                </div>
              </div>`;
          } else {
            box.innerHTML = `<div class="ln-empty"><div class="ln-empty__icon">🔍</div>검색 결과가 없습니다.</div>`;
          }
          return;
        }

        box.innerHTML = list.map(n => {
          if (n.id === inlineEditId) return renderEditCardHtml(n);
          return renderViewCardHtml(n);
        }).join("");

        // 카드 액션 바인딩
        box.querySelectorAll(".ln-card").forEach(card => {
          const id = card.dataset.id;
          if (id === inlineEditId) {
            bindEditCard(card);
            return;
          }
          card.querySelector('[data-act="edit"]')?.addEventListener("click", () => enterInlineEdit(id));
          card.querySelector('[data-act="del"]')?.addEventListener("click", () => deleteNote(id));
          const toggleBtn = card.querySelector('[data-act="toggle"]');
          const contentEl = card.querySelector("[data-content]");
          if (toggleBtn && contentEl) {
            toggleBtn.addEventListener("click", () => {
              const collapsed = contentEl.classList.toggle("ln-card__content--collapsed");
              toggleBtn.textContent = collapsed ? "전체 보기" : "접기";
            });
          }
          card.querySelectorAll(".ln-thumb[data-idx]").forEach(t => {
            t.addEventListener("click", () => {
              const note = cachedNotes.find(x => x.id === id);
              if (!note) return;
              openLightbox(note.images || [], +t.dataset.idx);
            });
          });
        });

        // 인라인 편집 카드의 미리보기 렌더 (DOM 삽입 후)
        if (inlineEditId) renderInlinePreview();
        // 임시 보존된 입력값을 1회 사용 후 비움 (저장·취소·진입 시점에는 자동으로 새 값 사용)
        inlineEditDraft = null;
        // 데이터 폭에 맞춰 페이지 폭 갱신
        adaptContentWidth();
      }

      function renderViewCardHtml(n) {
        const imgs = n.images || [];

          ? `<div class="ln-card__images ln-card__images--thumb">${

                <div class="ln-thumb" data-note="${n.id}" data-idx="${i}" title="${escapeHtml(img.name || "")}">
                  <img src="${makeUrl(img.blob)}" alt="${escapeHtml(img.name || "")}" />
                </div>
              `).join("")
            }${imgs.length > 6
              ? `<div class="ln-thumb" data-note="${n.id}" data-idx="6" style="display: grid; place-items: center; color: var(--text-2); font-size: 13px;">+${imgs.length - 6}</div>`
              : ""}</div>`
          : "";
        const updated = n.updatedAt && n.updatedAt !== n.createdAt
          ? `· 수정 ${new Date(n.updatedAt).toLocaleString("ko-KR", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" })}`
          : "";
        const created = n.createdAt
          ? new Date(n.createdAt).toLocaleString("ko-KR", { year: "2-digit", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" })

                <span class="ln-card__title">${escapeHtml(n.title || "(제목 없음)")}</span>

              ? `<div class="ln-card__content ln-card__content--collapsed" data-content>${escapeHtml(n.content)}</div>

      function renderEditCardHtml(n) {
        const draft = inlineEditDraft;
        const date = draft?.date ?? n.date ?? "";
        const title = draft?.title ?? n.title ?? "";
        const content = draft?.content ?? n.content ?? "";

          <article class="ln-card is-editing" data-id="${n.id}">
            <div class="ln-card__head">
              <div class="ln-card__meta">
                <span class="ln-card__date" style="background: var(--accent); color: #0b0d10;">편집 중</span>
                <span class="ln-card__title" style="color: var(--text-2); font-weight: 500; font-size: 13px;">아래에서 직접 수정한 뒤 <strong style="color: var(--accent);">저장</strong>을 누르세요</span>
              </div>
            </div>
            <div class="ln-card__edit-row ln-card__edit-row--two">

              </div>
            </div>
            <div class="ln-card__edit-field">
              <label>강의 내용</label>
              <textarea class="ln-edit-content" placeholder="내용을 입력하세요. Ctrl/Cmd+Enter로 저장">${escapeHtml(content)}</textarea>
            </div>
            <div class="ln-card__edit-field">
              <label>캡쳐 자료</label>
              <label class="ln-card__edit-drop">
                <input type="file" accept="image/*" multiple class="ln-edit-file" />
                <div>
                  <strong>이미지 추가</strong> · 드래그·클릭·붙여넣기(<kbd>Ctrl</kbd>+<kbd>V</kbd>)
                </div>
              </label>
              <div class="ln-preview ln-edit-preview" style="margin-top: 10px;"></div>
            </div>
            <div class="ln-card__edit-actions">
              <button class="ln-btn ln-btn--primary" data-act="save-edit">저장</button>
              <button class="ln-btn" data-act="cancel-edit">취소</button>

      function bindEditCard(card) {
        const id = card.dataset.id;
        card.querySelector('[data-act="save-edit"]').addEventListener("click", saveInlineEdit);
        card.querySelector('[data-act="cancel-edit"]').addEventListener("click", () => {
          if (!confirm("편집 내용을 버리고 닫을까요?")) return;
          exitInlineEdit();
        });
        card.querySelector('[data-act="del"]').addEventListener("click", () => deleteNote(id));

        // 파일 입력
        card.querySelector(".ln-edit-file").addEventListener("change", e => {
          addInlineImages(e.target.files);
          e.target.value = "";
        });

        // 드래그 앤 드롭
        const drop = card.querySelector(".ln-card__edit-drop");
        ["dragenter", "dragover"].forEach(ev => {
          card.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("is-drag"); });
        });
        ["dragleave", "drop"].forEach(ev => {
          card.addEventListener(ev, e => {
            if (ev === "drop") { e.preventDefault(); addInlineImages(e.dataTransfer.files); }
            if (ev === "dragleave" && e.target !== card) return;
            drop.classList.remove("is-drag");
          });
        });

        // Ctrl/Cmd+Enter 저장 (textarea), Esc 취소
        const ta = card.querySelector(".ln-edit-content");
        ta.addEventListener("keydown", e => {
          if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
            e.preventDefault();
            saveInlineEdit();
          } else if (e.key === "Escape") {
            e.preventDefault();
            if (confirm("편집 내용을 버리고 닫을까요?")) exitInlineEdit();
          }
        });
      }

      // ---------- 라이트박스 ----------
      function openLightbox(images, idx) {
        if (!images.length) return;
        lbImages = images;
        lbIdx = Math.max(0, Math.min(idx, images.length - 1));
        const lb = g("ln-lightbox");
        showLb();
        lb.classList.add("is-open");
      }
      function closeLightbox() {
        const lb = g("ln-lightbox");
        lb.classList.remove("is-open");
      }
      function showLb() {
        const img = lbImages[lbIdx];
        if (!img) return;
        g("ln-lb-img").src = makeUrl(img.blob);
        g("ln-lb-img").alt = img.name || "";
        g("ln-lb-caption").textContent = `${img.name || "이미지"} · ${fileSize(img.size || 0)} · ${lbIdx + 1}/${lbImages.length}`;
        g("ln-lb-prev").style.visibility = lbImages.length > 1 ? "" : "hidden";
        g("ln-lb-next").style.visibility = lbImages.length > 1 ? "" : "hidden";
      }
      g("ln-lb-close").addEventListener("click", closeLightbox);
      g("ln-lb-prev").addEventListener("click", () => { lbIdx = (lbIdx - 1 + lbImages.length) % lbImages.length; showLb(); });
      g("ln-lb-next").addEventListener("click", () => { lbIdx = (lbIdx + 1) % lbImages.length; showLb(); });
      g("ln-lightbox").addEventListener("click", e => { if (e.target === e.currentTarget) closeLightbox(); });
      const lbKeyHandler = e => {
        if (!g("ln-lightbox").classList.contains("is-open")) return;
        if (e.key === "Escape") closeLightbox();
        else if (e.key === "ArrowLeft") g("ln-lb-prev").click();
        else if (e.key === "ArrowRight") g("ln-lb-next").click();
      };
      document.addEventListener("keydown", lbKeyHandler);

      // ---------- 새로고침 ----------
      async function refresh() {
        try {
          // 이전 URL들은 재렌더 후 어차피 재생성되므로 여기서 정리
          revokeAllUrls();
          cachedNotes = await dbGetAll();
          renderList();
          renderPreview(); // 폼에도 URL 재발급
        } catch (e) {
          console.error(e);
          g("ln-list").innerHTML = `<div class="warn-card"><h3>저장소 접근 실패</h3><p>${escapeHtml(e?.message || String(e))}</p></div>`;
        }
      }

      // ---------- 가져오기/내보내기 ----------
      function blobToDataUrl(blob) {
        return new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload = () => resolve(r.result);
          r.onerror = () => reject(r.error);
          r.readAsDataURL(blob);
        });
      }
      function dataUrlToBlob(dataUrl) {
        const [meta, b64] = dataUrl.split(",");
        const m = /data:([^;]+);base64/.exec(meta);
        const type = m ? m[1] : "application/octet-stream";
        const bin = atob(b64);
        const arr = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
        return new Blob([arr], { type });
      }

      async function exportAll() {
        if (!cachedNotes.length) { alert("내보낼 노트가 없습니다."); return; }
        try {
          const data = [];
          for (const n of cachedNotes) {
            const images = [];
            for (const img of (n.images || [])) {
              images.push({
                id: img.id, name: img.name, type: img.type, size: img.size,
                dataUrl: await blobToDataUrl(img.blob),
              });
            }
            data.push({ ...n, images });
          }
          const payload = { version: 1, exportedAt: new Date().toISOString(), notes: data };
          const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          const stamp = new Date().toISOString().slice(0, 10);
          a.href = url; a.download = `bizpt-lecture-notes-${stamp}.json`;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          URL.revokeObjectURL(url);
          status(`${data.length}개 노트를 내보냈습니다`);
        } catch (e) {
          alert("내보내기 실패: " + (e?.message || e));
        }
      }

      // ---------- Markdown 일괄 내보내기 ----------
      async function exportMarkdown() {
        if (!cachedNotes.length) { alert("내보낼 노트가 없습니다."); return; }
        const includeImages = confirm(
          "이미지를 본문에 포함할까요?\n\n" +
          "[확인] 이미지 base64 임베드 — 한 파일로 휴대 가능 (파일 크기 큼)\n" +
          "[취소] 텍스트만 — 가볍지만 캡쳐는 빠짐"
        );
        try {
          status("정리본 생성 중...", "warn");
          // 강의 일자 오름차순 (학습 흐름 순)
          const notes = cachedNotes.slice().sort((a, b) =>
            (a.date || "").localeCompare(b.date || "") ||
            (a.createdAt || 0) - (b.createdAt || 0)
          );

          const lines = [];
          const now = new Date();
          lines.push(`# 강의 노트 정리본`);
          lines.push("");
          lines.push(`> 내보낸 시각: ${now.toLocaleString("ko-KR")}  `);
          lines.push(`> 노트 수: **${notes.length}개**${includeImages ? "" : " · 이미지 제외"}`);
          lines.push("");
          lines.push(`---`);
          lines.push("");

          // 목차
          if (notes.length > 1) {
            lines.push(`## 목차`);
            lines.push("");
            notes.forEach((n, i) => {
              const t = (n.title || "(제목 없음)").replace(/\n/g, " ");
              lines.push(`${i + 1}. **${n.date || "—"}** · ${t}`);
            });
            lines.push("");
            lines.push(`---`);
            lines.push("");
          }

          for (let i = 0; i < notes.length; i++) {
            const n = notes[i];
            const date = n.date || "(일자 미기재)";
            const created = n.createdAt ? new Date(n.createdAt).toLocaleString("ko-KR") : "—";
            const updated = n.updatedAt && n.updatedAt !== n.createdAt
              ? new Date(n.updatedAt).toLocaleString("ko-KR") : null;
            const imgs = n.images || [];

            lines.push(`## ${i + 1}. ${n.title || "(제목 없음)"}`);
            lines.push("");
            lines.push(`- **강의 일자**: ${date}`);
            lines.push(`- **등록**: ${created}${updated ? ` · 수정: ${updated}` : ""}`);
            if (imgs.length) lines.push(`- **이미지**: ${imgs.length}장`);
            lines.push("");

            if (n.content && n.content.trim()) {
              lines.push(n.content);
              lines.push("");
            }

            if (imgs.length) {
              lines.push(`### 캡쳐 자료`);
              lines.push("");
              for (let j = 0; j < imgs.length; j++) {
                const img = imgs[j];
                const safeName = (img.name || `image-${j + 1}`).replace(/[\[\]()<>|]/g, "_");
                if (includeImages) {
                  const dataUrl = await blobToDataUrl(img.blob);
                  lines.push(`![${safeName}](${dataUrl})`);
                } else {
                  const sizeKb = img.size ? `${(img.size / 1024).toFixed(0)}KB` : "";
                  lines.push(`- 📎 \`${safeName}\` ${sizeKb}`);
                }
                lines.push("");
              }
            }

            lines.push(`---`);
            lines.push("");
          }

          const md = lines.join("\n");
          const blob = new Blob([md], { type: "text/markdown;charset=utf-8" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          const stamp = now.toISOString().slice(0, 10);
          a.href = url;
          a.download = `bizpt-lecture-notes-${stamp}${includeImages ? "" : "-text"}.md`;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          URL.revokeObjectURL(url);

          const sizeKb = (blob.size / 1024).toFixed(0);
          status(`${notes.length}개 노트를 Markdown으로 내보냈습니다 (${sizeKb}KB)`);
        } catch (e) {
          console.error(e);
          alert("정리본 내보내기 실패: " + (e?.message || e));
          status("");
        }
      }

      async function importFile(file) {
        try {
          const text = await file.text();
          const payload = JSON.parse(text);
          const notes = Array.isArray(payload) ? payload : payload.notes;
          if (!Array.isArray(notes)) throw new Error("형식이 올바르지 않습니다");

          let added = 0, updated = 0;
          for (const n of notes) {
            if (!n || !n.id) continue;
            const images = (n.images || []).map(img => {
              if (img.blob instanceof Blob) return img;
              if (typeof img.dataUrl === "string") {
                return { id: img.id || uid("img"), name: img.name || "image", type: img.type || "image/png", size: img.size || 0, blob: dataUrlToBlob(img.dataUrl) };
              }
              return null;
            }).filter(Boolean);
            const existing = cachedNotes.find(x => x.id === n.id);
            const merged = {
              id: n.id,
              date: n.date || todayStr(),
              title: n.title || "",
              content: n.content || "",
              images,
              createdAt: n.createdAt || Date.now(),
              updatedAt: n.updatedAt || Date.now(),
            };
            await dbPut(merged);
            if (existing) updated++; else added++;
          }
          await refresh();
          alert(`가져오기 완료 — 신규 ${added}, 갱신 ${updated}`);
        } catch (e) {
          alert("가져오기 실패: " + (e?.message || e));
        }
      }

      // ---------- 이벤트 바인딩 ----------
      g("ln-save").addEventListener("click", saveNote);
      g("ln-clear").addEventListener("click", () => {
        const hasInput = g("ln-title").value.trim() || g("ln-content").value.trim() || pendingImages.length;
        if (hasInput && !confirm("작성 중인 내용을 버리고 폼을 초기화할까요?")) return;
        resetForm();
      });

      g("ln-file").addEventListener("change", e => {
        addFiles(e.target.files);
        e.target.value = "";
      });

      // 드래그 앤 드롭 — 폼 전체에서 동작
      const drop = g("ln-drop");
      const formEl = g("ln-form");
      ["dragenter", "dragover"].forEach(ev => {
        formEl.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("is-drag"); });
      });
      ["dragleave", "drop"].forEach(ev => {
        formEl.addEventListener(ev, e => {
          if (ev === "drop") { e.preventDefault(); addFiles(e.dataTransfer.files); }
          if (ev === "dragleave" && e.target !== formEl) return;
          drop.classList.remove("is-drag");
        });
      });

      // 클립보드 붙여넣기 — 폼 또는 인라인 편집 카드에 포커스가 있을 때
      const pasteHandler = e => {
        const active = document.activeElement;
        const editCard = inlineEditId ? document.querySelector(`.ln-card[data-id="${inlineEditId}"]`) : null;
        const inForm = formEl.contains(active);
        const inEditCard = editCard && editCard.contains(active);
        if (!inForm && !inEditCard && active !== document.body) return;

        const items = e.clipboardData?.items;
        if (!items) return;
        const files = [];
        for (const it of items) {
          if (it.kind === "file" && it.type.startsWith("image/")) {
            const f = it.getAsFile();
            if (f) files.push(f);
          }
        }
        if (!files.length) return;
        e.preventDefault();
        if (inEditCard) {
          addInlineImages(files);
        } else {
          addFiles(files);
          status(`${files.length}장 붙여넣음`);
        }
      };
      document.addEventListener("paste", pasteHandler);

      // 단축키 Ctrl/Cmd+S 저장
      const saveKey = e => {
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "s") {
          if (formEl.contains(document.activeElement)) {
            e.preventDefault();
            saveNote();
          }
        }
      };
      document.addEventListener("keydown", saveKey);

      // 정렬 토글
      document.querySelectorAll(".ln-sort-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          sortMode = btn.dataset.sort;
          localStorage.setItem(SORT_KEY, sortMode);
          document.querySelectorAll(".ln-sort-btn").forEach(b => b.classList.toggle("is-active", b.dataset.sort === sortMode));
          renderList();
        });
      });

      g("ln-search").addEventListener("input", e => {
        searchQuery = e.target.value;
        renderList();
      });

      g("ln-export").addEventListener("click", exportAll);
      g("ln-export-md").addEventListener("click", exportMarkdown);
      g("ln-import").addEventListener("change", e => {
        const f = e.target.files[0];
        if (f) importFile(f);
        e.target.value = "";
      });

      // 페이지 와이드 모드
      const contentEl = document.getElementById("content");
      contentEl.classList.add("is-wide");

      // 윈도우 리사이즈 시 폭 재계산 (뷰포트 한계 변경 반영)
      let resizeTimer;
      const resizeHandler = () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(adaptContentWidth, 80);
      };
      window.addEventListener("resize", resizeHandler);

      // 폼 입력 시에도 폭 갱신 (긴 제목/본문 입력 → 즉시 확장)
      const inputAdapt = () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(adaptContentWidth, 120);
      };
      ["ln-title", "ln-content"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener("input", inputAdapt);
      });

      // 인라인 편집 카드 입력 변화도 폭에 반영 (위임)
      const listEl = document.getElementById("ln-list");
      if (listEl) {
        listEl.addEventListener("input", e => {
          if (e.target.matches(".ln-edit-title, .ln-edit-content")) {
            captureInlineDraft();
            inputAdapt();
          }
        });
      }

      // 페이지 이탈 정리 — 다음 navigate가 호출되어 #content가 비워지면 핸들러도 제거
      const cleanup = () => {
        document.removeEventListener("paste", pasteHandler);
        document.removeEventListener("keydown", saveKey);
        document.removeEventListener("keydown", lbKeyHandler);
        window.removeEventListener("resize", resizeHandler);
        revokeAllUrls();
        contentEl.classList.remove("is-wide");
        contentEl.style.removeProperty("--content-w");
        observer.disconnect();
      };
      const observer = new MutationObserver(() => {
        // 폼이 DOM에서 제거되면 cleanup
        if (!document.body.contains(formEl)) cleanup();
      });
      observer.observe(contentEl, { childList: true });

      // ---------- 초기화 ----------
      // 정렬 버튼 초기 활성 상태
      document.querySelectorAll(".ln-sort-btn").forEach(b => b.classList.toggle("is-active", b.dataset.sort === sortMode));
      resetForm();
      refresh();
    };

    // ============================================
    // 용어 입력 페이지 초기화 (localStorage 기반)
    // ============================================
    pageInits["tpl-term-input"] = () => {
      const STORAGE_KEY = "bizpt_terms_v1";
      const SORT_KEY = "bizpt_terms_sort_v1";
      const FILTER_KEY = "bizpt_terms_filter_v1";

      const g = id => document.getElementById(id);

      let editingId = null;
      let cachedTerms = [];
      let sortMode = localStorage.getItem(SORT_KEY) || "recent"; // recent | term-asc | category
      let categoryFilter = localStorage.getItem(FILTER_KEY) || ""; // "" = 전체
      let searchQuery = "";

      // ---------- 저장소 ----------
      function loadAll() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
        catch (e) { return []; }
      }
      function saveAll(list) {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); return true; }
        catch (e) { alert("저장 실패: " + e.message); return false; }
      }

      function uid() {
        return "term_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);
      }
      function status(msg, type) {
        const el = g("ti-form-status");
        if (!el) return;
        el.textContent = msg;
        el.style.color = type === "error" ? "var(--danger)"
                       : type === "warn" ? "var(--warning)"
                       : "var(--success)";
        clearTimeout(status._t);
        if (msg) status._t = setTimeout(() => { el.textContent = ""; }, 2400);
      }

      // ---------- 폼 ----------
      function resetForm() {
        editingId = null;
        g("ti-category").value = "";
        g("ti-term").value = "";
        g("ti-definition").value = "";
        g("ti-source").value = "";
        g("ti-note").value = "";
        g("ti-form-mode").textContent = "새 용어";
        g("ti-editing-title").textContent = "";
        g("ti-cancel").style.display = "none";
        g("ti-save").textContent = "저장";
      }
      function loadIntoForm(t) {
        editingId = t.id;
        g("ti-category").value = t.category || "";
        g("ti-term").value = t.term || "";
        g("ti-definition").value = t.definition || "";
        g("ti-source").value = t.source || "";
        g("ti-note").value = t.note || "";
        g("ti-form-mode").textContent = "수정 중";
        g("ti-editing-title").textContent = t.term ? `「${t.term}」` : "";
        g("ti-cancel").style.display = "";
        g("ti-save").textContent = "수정 저장";
        g("ti-form").scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function saveTerm() {
        const category = g("ti-category").value.trim();
        const term = g("ti-term").value.trim();
        const definition = g("ti-definition").value.trim();
        const source = g("ti-source").value.trim();
        const note = g("ti-note").value.trim();

        if (!term) { status("용어를 입력하세요.", "error"); g("ti-term").focus(); return; }
        if (!definition) { status("정의를 입력하세요.", "error"); g("ti-definition").focus(); return; }

        const list = loadAll();
        const now = Date.now();

        // 중복 검사 (편집 중인 것 제외, 같은 카테고리 안에서)
        const dup = list.find(t =>
          t.id !== editingId &&
          t.term.toLowerCase() === term.toLowerCase() &&
          (t.category || "").toLowerCase() === category.toLowerCase()
        );
        if (dup) {
          if (!confirm(`동일한 용어가 이미 있습니다 (${dup.category || "(미분류)"} > ${dup.term}). 그래도 추가할까요?`)) return;
        }

        if (editingId) {
          const i = list.findIndex(t => t.id === editingId);
          if (i >= 0) {
            list[i] = { ...list[i], category, term, definition, source, note, updatedAt: now };
          }
        } else {
          list.push({
            id: uid(), category, term, definition, source, note,
            createdAt: now, updatedAt: now,
          });
        }
        if (!saveAll(list)) return;
        status(editingId ? "수정 저장됨" : "새 용어가 저장되었습니다");
        resetForm();
        refresh();
      }

      function deleteTerm(id) {
        const list = loadAll();
        const t = list.find(x => x.id === id);
        if (!t) return;
        if (!confirm(`"${t.term}" 용어를 삭제할까요? (되돌릴 수 없습니다)`)) return;
        const next = list.filter(x => x.id !== id);
        saveAll(next);
        if (editingId === id) resetForm();
        refresh();
      }

      // ---------- 검색·필터·정렬 ----------
      function highlight(text, q) {
        if (!q || !text) return escapeHtml(text || "");
        const re = new RegExp(escapeRegExp(q), "gi");
        return escapeHtml(text).replace(
          new RegExp(escapeRegExp(escapeHtml(q)), "gi"),
          m => `<span class="ti-highlight">${m}</span>`
        );
      }

      function applyFiltersAndSort(terms) {
        const q = searchQuery.trim().toLowerCase();
        let arr = terms.slice();
        if (categoryFilter) {
          arr = arr.filter(t => (t.category || "") === categoryFilter);
        }
        if (q) {
          arr = arr.filter(t =>
            (t.term || "").toLowerCase().includes(q) ||
            (t.definition || "").toLowerCase().includes(q) ||
            (t.note || "").toLowerCase().includes(q) ||
            (t.source || "").toLowerCase().includes(q) ||
            (t.category || "").toLowerCase().includes(q)
          );
        }
        if (sortMode === "term-asc") {
          arr.sort((a, b) => (a.term || "").localeCompare(b.term || "", "ko"));
        } else if (sortMode === "category") {
          arr.sort((a, b) => {
            const ca = (a.category || "ㅎ미분류").localeCompare(b.category || "ㅎ미분류", "ko");
            if (ca !== 0) return ca;
            return (a.term || "").localeCompare(b.term || "", "ko");
          });
        } else {
          arr.sort((a, b) => (b.updatedAt || b.createdAt || 0) - (a.updatedAt || a.createdAt || 0));
        }
        return arr;
      }

      function renderChips() {
        const counts = new Map();
        cachedTerms.forEach(t => {
          const k = t.category || "(미분류)";
          counts.set(k, (counts.get(k) || 0) + 1);
        });
        const cats = [...counts.keys()].sort((a, b) => a.localeCompare(b, "ko"));
        const box = g("ti-chips");
        if (!cats.length) { box.innerHTML = ""; return; }
        const allActive = !categoryFilter ? "is-active" : "";
        const total = cachedTerms.length;
        box.innerHTML = `<button class="ti-chip ${allActive}" data-cat="">전체<span class="ti-chip__count">${total}</span></button>` +
          cats.map(c => {
            const real = c === "(미분류)" ? "" : c;
            const active = categoryFilter === real ? "is-active" : "";
            return `<button class="ti-chip ${active}" data-cat="${escapeHtml(real)}">${escapeHtml(c)}<span class="ti-chip__count">${counts.get(c)}</span></button>`;
          }).join("");
        box.querySelectorAll(".ti-chip").forEach(btn => {
          btn.addEventListener("click", () => {
            categoryFilter = btn.dataset.cat || "";
            localStorage.setItem(FILTER_KEY, categoryFilter);
            renderChips();
            renderList();
          });
        });
      }

      function renderCatDatalist() {
        const cats = [...new Set(cachedTerms.map(t => t.category).filter(Boolean))]
          .sort((a, b) => a.localeCompare(b, "ko"));
        g("ti-cat-list").innerHTML = cats.map(c => `<option value="${escapeHtml(c)}"></option>`).join("");
      }

      function renderList() {
        const box = g("ti-list");
        const list = applyFiltersAndSort(cachedTerms);
        const tag = g("ti-count-tag");
        if (tag) tag.textContent = `${cachedTerms.length}개`;

        if (!list.length) {
          if (!cachedTerms.length) {
            box.innerHTML = `
              <div class="ln-empty">
                <div class="ln-empty__icon">📚</div>
                <div>아직 입력된 용어가 없습니다.</div>
                <div style="font-size: 12px; margin-top: 6px; color: var(--text-3);">
                  위 폼에서 첫 용어를 추가해 보세요.
                </div>
              </div>`;
          } else {
            box.innerHTML = `<div class="ln-empty"><div class="ln-empty__icon">🔍</div>조건에 맞는 용어가 없습니다.</div>`;
          }
          return;
        }

        const q = searchQuery.trim();
        const renderCard = t => {
          const cat = t.category || "(미분류)";
          const meta = [];
          if (t.source) meta.push(`<span><strong>출처</strong> ${highlight(t.source, q)}</span>`);
          if (t.note) meta.push(`<span><strong>메모</strong> ${highlight(t.note, q)}</span>`);
          const updated = t.updatedAt ? new Date(t.updatedAt).toLocaleDateString("ko-KR", { year: "2-digit", month: "2-digit", day: "2-digit" }) : "";
          meta.push(`<span style="margin-left: auto; color: var(--text-3);">${updated}</span>`);
          return `
            <div class="ti-card" data-id="${t.id}">
              <div class="ti-card__head">
                <div>
                  <span class="ti-card__cat">${escapeHtml(cat)}</span>
                  <span class="ti-card__term">${highlight(t.term, q)}</span>
                </div>
                <div class="ti-card__actions">
                  <button class="ln-btn" data-act="edit">편집</button>
                  <button class="ln-btn ln-btn--danger" data-act="del">삭제</button>
                </div>
              </div>
              <div class="ti-card__definition">${highlight(t.definition, q)}</div>
              ${meta.length ? `<div class="ti-card__meta">${meta.join("")}</div>` : ""}
            </div>
          `;
        };

        if (sortMode === "category") {
          // 카테고리별 그룹핑
          const groups = new Map();
          list.forEach(t => {
            const k = t.category || "(미분류)";
            if (!groups.has(k)) groups.set(k, []);
            groups.get(k).push(t);
          });
          box.innerHTML = [...groups.entries()].map(([cat, items]) => `
            <div class="ti-group">
              <div class="ti-group__head">
                <div class="ti-group__name">${escapeHtml(cat)}</div>
                <div class="ti-group__count">${items.length}개</div>
              </div>
              ${items.map(renderCard).join("")}
            </div>
          `).join("");
        } else {
          box.innerHTML = list.map(renderCard).join("");
        }

        // 액션 바인딩
        box.querySelectorAll(".ti-card").forEach(card => {
          const id = card.dataset.id;
          card.querySelector('[data-act="edit"]')?.addEventListener("click", () => {
            const t = cachedTerms.find(x => x.id === id);
            if (t) loadIntoForm(t);
          });
          card.querySelector('[data-act="del"]')?.addEventListener("click", () => deleteTerm(id));
        });
      }

      function refresh() {
        cachedTerms = loadAll();
        renderCatDatalist();
        renderChips();
        renderList();
      }

      // ---------- 가져오기/내보내기 ----------
      function exportAll() {
        if (!cachedTerms.length) { alert("내보낼 용어가 없습니다."); return; }
        const payload = { version: 1, exportedAt: new Date().toISOString(), terms: cachedTerms };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        const stamp = new Date().toISOString().slice(0, 10);
        a.href = url; a.download = `bizpt-terms-${stamp}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
        status(`${cachedTerms.length}개 용어를 내보냈습니다`);
      }

      async function importFile(file) {
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          const incoming = Array.isArray(data) ? data : data.terms;
          if (!Array.isArray(incoming)) throw new Error("형식이 올바르지 않습니다");

          const list = loadAll();
          let added = 0, updated = 0;
          incoming.forEach(t => {
            if (!t || !t.term) return;
            const norm = {
              id: t.id || uid(),
              category: t.category || "",
              term: t.term,
              definition: t.definition || "",
              source: t.source || "",
              note: t.note || "",
              createdAt: t.createdAt || Date.now(),
              updatedAt: t.updatedAt || Date.now(),
            };
            const i = list.findIndex(x => x.id === norm.id);
            if (i >= 0) { list[i] = norm; updated++; }
            else { list.push(norm); added++; }
          });
          saveAll(list);
          refresh();
          alert(`가져오기 완료 — 신규 ${added}, 갱신 ${updated}`);
        } catch (e) {
          alert("가져오기 실패: " + (e?.message || e));
        }
      }

      // ---------- 이벤트 ----------
      g("ti-save").addEventListener("click", saveTerm);
      g("ti-cancel").addEventListener("click", () => { resetForm(); status("편집 취소됨", "warn"); });
      g("ti-clear").addEventListener("click", () => {
        if (editingId && !confirm("편집 중인 변경사항을 버리고 폼을 초기화할까요?")) return;
        resetForm();
      });
      g("ti-export").addEventListener("click", exportAll);
      g("ti-import").addEventListener("change", e => {
        const f = e.target.files[0];
        if (f) importFile(f);
        e.target.value = "";
      });

      g("ti-search").addEventListener("input", e => {
        searchQuery = e.target.value;
        renderList();
      });

      document.querySelectorAll(".ti-sort-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          sortMode = btn.dataset.sort;
          localStorage.setItem(SORT_KEY, sortMode);
          document.querySelectorAll(".ti-sort-btn").forEach(b => b.classList.toggle("is-active", b.dataset.sort === sortMode));
          renderList();
        });
      });

      // 폼 안에서 Ctrl/Cmd+S 저장
      const formEl = g("ti-form");
      const saveKey = e => {
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "s") {
          if (formEl.contains(document.activeElement)) {
            e.preventDefault();
            saveTerm();
          }
        }
      };
      document.addEventListener("keydown", saveKey);
      const observer = new MutationObserver(() => {
        if (!document.body.contains(formEl)) {
          document.removeEventListener("keydown", saveKey);
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById("content"), { childList: true });

      // 초기화
      document.querySelectorAll(".ti-sort-btn").forEach(b => b.classList.toggle("is-active", b.dataset.sort === sortMode));
      resetForm();
      refresh();
    };

    window.navigate = navigate;

    document.addEventListener("DOMContentLoaded", () => {
      renderNav();
      setupSidebarToggle();
      setupSearch();
      const hash = location.hash.replace("#", "") || "home";
      navigate(hash);
      window.addEventListener("hashchange", () => {
        navigate(location.hash.replace("#", "") || "home");
      });
    });
  </script>
</body>
</html>
