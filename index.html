<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비지니스 PT 강의 정리</title>
  <style>
    /* ============================================
       Business PT Notes - Modern Dark Theme (inlined)
       ============================================ */
    :root {
      --bg-0: #0b0d10; --bg-1: #111418; --bg-2: #171b21; --bg-3: #1f252d;
      --bg-hover: #232a33; --border: #262d36; --border-strong: #323b47;
      --text-0: #e8edf4; --text-1: #b9c2cf; --text-2: #7f8a99; --text-3: #5a6472;
      --accent: #6ea8ff; --accent-soft: rgba(110, 168, 255, 0.14); --accent-strong: #4f8dff;
      --success: #4ade80; --warning: #fbbf24; --danger: #f87171;
      --sidebar-w: 280px; --topbar-h: 56px; --radius: 10px; --radius-sm: 6px;
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.3);
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard",
        "Apple SD Gothic Neo", "Noto Sans KR", Roboto, sans-serif;
      --font-mono: "JetBrains Mono", "Fira Code", Consolas, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-sans); background: var(--bg-0); color: var(--text-0);
      line-height: 1.65; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }
    .app { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      background: var(--bg-1); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; position: sticky; top: 0;
      height: 100vh; overflow: hidden;
    }
    .sidebar__header {
      padding: 18px 18px 14px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand__mark {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent) 0%, #8a5cff 100%);
      border-radius: 8px; display: grid; place-items: center;
      font-weight: 800; color: #0b0d10; font-size: 16px; letter-spacing: -0.5px;
    }
    .brand__title { font-size: 14px; font-weight: 600; color: var(--text-0); letter-spacing: 0.2px; }
    .brand__subtitle { font-size: 11px; color: var(--text-2); margin-top: 2px; }

    .sidebar__toggle {
      display: none; background: transparent; border: none; color: var(--text-1);
      cursor: pointer; padding: 6px; flex-direction: column; gap: 3px;
    }
    .sidebar__toggle span { width: 18px; height: 2px; background: currentColor; border-radius: 2px; }

    .nav {
      flex: 1; overflow-y: auto; padding: 14px 10px 20px;
      scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent;
    }
    .nav::-webkit-scrollbar { width: 6px; }
    .nav::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
    .nav__section { margin-bottom: 18px; }
    .nav__heading {
      font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--text-3); padding: 6px 10px; font-weight: 600;
    }
    .nav__item {
      display: block; padding: 8px 12px; margin: 2px 0;
      color: var(--text-1); text-decoration: none; font-size: 13.5px;
      border-radius: var(--radius-sm); border-left: 2px solid transparent;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      cursor: pointer;
    }
    .nav__item:hover { background: var(--bg-hover); color: var(--text-0); }
    .nav__item.is-active {
      background: var(--accent-soft); color: var(--accent);
      border-left-color: var(--accent); font-weight: 500;
    }

    .sidebar__footer {
      padding: 12px 16px; border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text-3);
    }
    .meta { display: flex; justify-content: space-between; }
    .meta__label { color: var(--text-3); }
    .meta__value { color: var(--text-1); font-family: var(--font-mono); }

    /* Main */
    .main { display: flex; flex-direction: column; min-width: 0; }
    .topbar {
      height: var(--topbar-h); background: var(--bg-1);
      border-bottom: 1px solid var(--border); display: flex; align-items: center;
      padding: 0 20px; gap: 16px; position: sticky; top: 0; z-index: 10;
      backdrop-filter: blur(8px);
    }
    .topbar__menu {
      display: none; background: transparent; border: 1px solid var(--border);
      color: var(--text-1); width: 34px; height: 34px;
      border-radius: var(--radius-sm); cursor: pointer; font-size: 16px;
    }
    .topbar__breadcrumb { font-size: 13px; color: var(--text-2); flex: 1; }
    .topbar__breadcrumb strong { color: var(--text-0); font-weight: 500; }
    .topbar__search input {
      background: var(--bg-2); border: 1px solid var(--border); color: var(--text-0);
      padding: 7px 12px; border-radius: var(--radius-sm); font-size: 13px;
      width: 240px; outline: none;
      transition: border-color 0.15s ease, background 0.15s ease;
      font-family: inherit;
    }
    .topbar__search input:focus { border-color: var(--accent); background: var(--bg-3); }
    .topbar__search input::placeholder { color: var(--text-3); }

    .content { flex: 1; padding: 32px 48px 80px; max-width: 960px; width: 100%; margin: 0 auto; }

    /* Typography */
    .content h1 { font-size: 30px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 12px; color: var(--text-0); }
    .content h2 {
      font-size: 22px; font-weight: 600; margin-top: 36px; margin-bottom: 14px;
      padding-bottom: 8px; border-bottom: 1px solid var(--border); color: var(--text-0);
    }
    .content h3 { font-size: 17px; font-weight: 600; margin-top: 24px; margin-bottom: 10px; color: var(--text-0); }
    .content h4 { font-size: 14.5px; font-weight: 600; margin-top: 18px; margin-bottom: 8px; color: var(--text-1); }
    .content p { color: var(--text-1); margin-bottom: 14px; }
    .content .lead { font-size: 16px; color: var(--text-1); margin-bottom: 24px; }
    .content ul, .content ol { color: var(--text-1); padding-left: 22px; margin-bottom: 16px; }
    .content li { margin: 4px 0; }
    .content a {
      color: var(--accent); text-decoration: none;
      border-bottom: 1px solid transparent; transition: border-color 0.15s ease;
    }
    .content a:hover { border-bottom-color: var(--accent); }
    .content strong { color: var(--text-0); font-weight: 600; }
    .content em { color: var(--text-1); }
    .content code {
      background: var(--bg-2); border: 1px solid var(--border);
      padding: 1px 6px; border-radius: 4px; font-family: var(--font-mono);
      font-size: 0.88em; color: var(--accent);
    }
    .content pre {
      background: var(--bg-1); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      overflow-x: auto; margin: 16px 0;
    }
    .content pre code { background: transparent; border: none; padding: 0; color: var(--text-1); }
    .content blockquote {
      border-left: 3px solid var(--accent); background: var(--bg-2);
      padding: 12px 16px; margin: 16px 0; color: var(--text-1);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }
    .content table { width: 100%; border-collapse: collapse; margin: 18px 0; font-size: 13.5px; }
    .content th, .content td { text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .content th {
      background: var(--bg-2); color: var(--text-0); font-weight: 600;
      border-bottom-color: var(--border-strong);
    }
    .content tr:hover td { background: var(--bg-2); }
    .content hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

    /* Components */
    .info-card, .tip-card, .warn-card, .key-card {
      background: var(--bg-1); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 22px; margin: 20px 0;
    }
    .info-card h3, .tip-card h3, .warn-card h3, .key-card h3 {
      margin-top: 0; font-size: 14px; text-transform: uppercase; letter-spacing: 0.8px;
    }
    .tip-card { border-left: 3px solid var(--success); }
    .tip-card h3 { color: var(--success); }
    .warn-card { border-left: 3px solid var(--warning); }
    .warn-card h3 { color: var(--warning); }
    .key-card { border-left: 3px solid var(--accent); }
    .key-card h3 { color: var(--accent); }

    .tag {
      display: inline-block; padding: 3px 10px; font-size: 11px;
      background: var(--bg-3); color: var(--text-1);
      border-radius: 999px; border: 1px solid var(--border);
      margin-right: 4px; letter-spacing: 0.3px;
    }
    .tag--accent { background: var(--accent-soft); color: var(--accent); border-color: transparent; }

    .cards-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px; margin: 18px 0;
    }
    .card {
      background: var(--bg-1); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px;
      transition: border-color 0.15s ease, transform 0.15s ease;
      cursor: pointer; text-decoration: none; color: inherit; display: block;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .card__title { font-size: 15px; font-weight: 600; color: var(--text-0); margin-bottom: 6px; }
    .card__desc { font-size: 12.5px; color: var(--text-2); line-height: 1.5; }

    .placeholder h1 { margin-top: 0; }
    .empty { text-align: center; padding: 80px 20px; color: var(--text-2); }
    .empty__icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }

    .footer {
      padding: 20px 48px; border-top: 1px solid var(--border);
      color: var(--text-3); font-size: 12px; text-align: center;
    }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed; top: 0; left: 0; width: var(--sidebar-w);
        transform: translateX(-100%); transition: transform 0.25s ease;
        z-index: 100; box-shadow: var(--shadow-md);
      }
      .sidebar.is-open { transform: translateX(0); }
      .topbar__menu { display: inline-flex; align-items: center; justify-content: center; }
      .sidebar__toggle { display: flex; }
      .content { padding: 24px 20px 60px; }
      .topbar__search input { width: 140px; }
    }
    @media (max-width: 540px) { .topbar__search { display: none; } }

    .search-hit { background: rgba(250, 204, 21, 0.25); color: var(--text-0); border-radius: 2px; padding: 0 2px; }

    /* ============================================
       Traffic Calculator (트래픽 계산기 페이지 전용)
       ============================================ */
    .tc-panel {
      background: var(--bg-1); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 22px; margin: 18px 0;
    }
    .tc-panel--results { border-color: var(--accent); background: linear-gradient(to bottom, var(--bg-1), var(--bg-2)); }
    .tc-panel__title {
      margin-top: 0; margin-bottom: 14px;
      font-size: 14px; text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--accent);
    }
    .tc-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
    .tc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .tc-grid--3 { grid-template-columns: repeat(3, 1fr); }
    @media (max-width: 700px) {
      .tc-grid, .tc-grid--3 { grid-template-columns: 1fr; }
    }
    .tc-label {
      font-size: 12.5px; color: var(--text-1); font-weight: 500;
      display: flex; align-items: center; gap: 8px;
    }
    .tc-hint { font-size: 11px; color: var(--text-3); font-weight: 400; }
    .tc-input {
      background: var(--bg-2); border: 1px solid var(--border);
      color: var(--text-0); padding: 8px 12px;
      border-radius: var(--radius-sm); font-size: 14px;
      font-family: var(--font-mono); outline: none; width: 100%;
      transition: border-color 0.15s ease;
    }
    .tc-input:focus { border-color: var(--accent); background: var(--bg-3); }
    .tc-input-suffix { position: relative; display: flex; align-items: center; }
    .tc-input-suffix .tc-input { padding-right: 28px; }
    .tc-suffix {
      position: absolute; right: 10px; font-size: 12px; color: var(--text-2);
      pointer-events: none; font-family: var(--font-mono);
    }
    .tc-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .tc-btn {
      background: var(--bg-2); border: 1px solid var(--border);
      color: var(--text-0); padding: 8px 14px;
      border-radius: var(--radius-sm); font-size: 13px; cursor: pointer;
      font-family: inherit; transition: background 0.15s ease, border-color 0.15s ease;
    }
    .tc-btn:hover { background: var(--bg-3); border-color: var(--border-strong); }
    .tc-btn--primary {
      background: var(--accent-soft); border-color: transparent; color: var(--accent); font-weight: 500;
    }
    .tc-btn--primary:hover { background: rgba(110, 168, 255, 0.22); }
    .tc-btn--danger { color: var(--danger); }
    .tc-btn--danger:hover { background: rgba(248, 113, 113, 0.1); border-color: var(--danger); }
    .tc-results-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }
    .tc-result {
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px 14px;
    }
    .tc-result--highlight { background: var(--accent-soft); border-color: transparent; }
    .tc-result__label { font-size: 11.5px; color: var(--text-2); margin-bottom: 4px; }
    .tc-result__value {
      font-size: 20px; font-weight: 600;
      font-family: var(--font-mono); color: var(--text-0);
    }
    .tc-result--highlight .tc-result__value { color: var(--accent); }
    .tc-unit { font-size: 12px; color: var(--text-3); font-weight: 400; margin-left: 4px; }
    .tc-scenario {
      display: grid; grid-template-columns: 1.5fr 1fr 1fr auto auto;
      gap: 10px; align-items: center;
      padding: 10px 12px; background: var(--bg-2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); margin-bottom: 6px; font-size: 13px;
    }
    .tc-scenario__name { font-weight: 500; color: var(--text-0); }
    .tc-scenario__meta { font-size: 12px; color: var(--text-2); font-family: var(--font-mono); }
    .tc-scenario__btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--text-1); padding: 4px 10px; font-size: 12px;
      border-radius: 4px; cursor: pointer; font-family: inherit;
    }
    .tc-scenario__btn:hover { background: var(--bg-3); color: var(--text-0); }
    .tc-scenario__btn--del:hover { color: var(--danger); border-color: var(--danger); }
    .tc-empty {
      text-align: center; padding: 20px; color: var(--text-3);
      background: var(--bg-2); border: 1px dashed var(--border);
      border-radius: var(--radius-sm); font-size: 13px;
    }
    .tc-sort-btn.is-active {
      background: var(--accent-soft); color: var(--accent);
      border-color: transparent; font-weight: 500;
    }
    .tc-scenario__memo {
      grid-column: 1 / -1;
      font-size: 12px; color: var(--text-2);
      padding-top: 6px; border-top: 1px dashed var(--border);
      margin-top: 4px; white-space: pre-wrap;
    }
    @media (max-width: 700px) {
      .tc-scenario { grid-template-columns: 1fr 1fr; }
      .tc-scenario__meta { grid-column: span 2; }
    }

    /* ============================================
       Diagram components — 도식 시각화
       ============================================ */
    /* Funnel — 깔때기 시각화 */
    .funnel { margin: 18px 0; display: flex; flex-direction: column; align-items: center; }
    .funnel__step {
      width: var(--w, 100%); min-width: 180px;
      padding: 14px 18px;
      background: var(--bg-1); border: 1px solid var(--border);
      border-radius: var(--radius-sm); text-align: center;
      transition: all 0.2s ease;
    }
    .funnel__step--accent {
      background: linear-gradient(135deg, var(--accent-soft), rgba(138, 92, 255, 0.12));
      border-color: var(--accent); color: var(--accent);
    }
    .funnel__label { font-size: 11.5px; color: var(--text-2); margin-bottom: 4px; letter-spacing: 0.3px; }
    .funnel__value { font-size: 20px; font-weight: 700; font-family: var(--font-mono); color: var(--text-0); letter-spacing: -0.5px; }
    .funnel__step--accent .funnel__value { color: var(--accent); }
    .funnel__rate {
      font-size: 11px; color: var(--text-2);
      background: var(--bg-2); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 999px;
      margin: 6px 0; font-family: var(--font-mono);
    }
    .funnel__rate--key {
      background: var(--accent-soft); color: var(--accent); border-color: transparent;
    }

    /* Horizontal flow chain */
    .flow-chain {
      display: flex; align-items: center; gap: 4px;
      margin: 16px 0; overflow-x: auto; padding: 4px 2px 8px;
    }
    .flow-chain__step {
      flex-shrink: 0; padding: 12px 16px;
      background: var(--bg-1); border: 1px solid var(--border);
      border-radius: var(--radius-sm); min-width: 90px; text-align: center;
      font-size: 13px; color: var(--text-0);
    }
    .flow-chain__step--first { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); font-weight: 500; }
    .flow-chain__arrow {
      color: var(--border-strong); font-size: 18px;
      flex-shrink: 0; user-select: none;
    }

    /* Bidirectional diagram (planning ← / production →) */
    .bidir {
      margin: 20px 0; padding: 18px;
      background: var(--bg-1); border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .bidir__row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0;
    }
    .bidir__row + .bidir__row { border-top: 1px dashed var(--border); margin-top: 4px; }
    .bidir__tag {
      font-size: 11px; padding: 4px 10px;
      border-radius: 4px; min-width: 84px; text-align: center;
      letter-spacing: 0.4px; font-weight: 500; flex-shrink: 0;
    }
    .bidir__row--plan .bidir__tag { background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent); }
    .bidir__row--prod .bidir__tag { background: rgba(74, 222, 128, 0.12); color: var(--success); border: 1px solid var(--success); }
    .bidir__stages {
      display: flex; align-items: center; gap: 6px; flex: 1;
      overflow-x: auto; padding-bottom: 2px;
    }
    .bidir__stage {
      padding: 8px 12px; background: var(--bg-2);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-size: 12.5px; color: var(--text-0); white-space: nowrap;
    }
    .bidir__stage--highlight { border-color: var(--accent); color: var(--accent); }
    .bidir__stage--highlight-prod { border-color: var(--success); color: var(--success); }
    .bidir__arrow { color: var(--text-3); font-size: 14px; flex-shrink: 0; }

    /* Numbered stages stack */
    .stages { margin: 18px 0; }
    .stages__item {
      display: flex; gap: 14px;
      padding: 14px 18px;
      background: var(--bg-1); border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .stages__item--final {
      background: var(--accent-soft); border-color: var(--accent);
    }
    .stages__num {
      flex-shrink: 0; width: 30px; height: 30px;
      background: var(--accent-soft); color: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; font-family: var(--font-mono);
    }
    .stages__item--final .stages__num { background: var(--accent); color: var(--bg-0); }
    .stages__body { flex: 1; }
    .stages__title { font-size: 14.5px; font-weight: 600; color: var(--text-0); }
    .stages__detail { font-size: 12.5px; color: var(--text-2); margin-top: 3px; }
    .stages__formula {
      font-family: var(--font-mono); font-size: 11.5px;
      color: var(--accent); margin-top: 5px;
    }
    .stages__connector {
      display: flex; align-items: center; justify-content: flex-start;
      height: 16px; padding-left: 30px;
    }
    .stages__connector::before {
      content: ""; width: 2px; height: 100%;
      background: linear-gradient(to bottom, var(--border-strong), var(--border));
      margin-left: 14px;
    }

    /* KPI grid (4 metrics visual) */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px; margin: 14px 0;
    }
    .kpi-card {
      background: var(--bg-1); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 14px 16px;
    }
    .kpi-card__label {
      font-size: 11px; color: var(--text-2);
      text-transform: uppercase; letter-spacing: 0.6px;
      margin-bottom: 6px;
    }
    .kpi-card__value {
      font-size: 24px; font-weight: 700;
      font-family: var(--font-mono); color: var(--accent);
      letter-spacing: -0.5px;
    }
    .kpi-card__sub { font-size: 11px; color: var(--text-3); margin-top: 4px; }

    /* Comparison layout (1-4강 + 1-5강 overlay) */
    .compare-box {
      background: var(--bg-1); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px;
      margin: 18px 0;
    }
    .compare-box__title {
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--accent); margin-bottom: 10px;
    }
    .compare-box--second { border-color: var(--success); margin-top: 12px; }
    .compare-box--second .compare-box__title { color: var(--success); }
    .compare-box__link {
      text-align: center; color: var(--text-3); font-size: 11px;
      margin: 4px 0; font-family: var(--font-mono);
    }
  </style>

      <h1>수익화 구조 — 기획은 역산, 제작은 정방향</h1>
      <p class="lead">
        매출은 <code>P × Q</code>라는 공식에서 출발한다. 이 공식이 콘텐츠 깔때기로 옮겨지면

      </p>

      <div class="key-card">
        <h3>한 줄 요약</h3>
        <p>사람이 먼저 모여야 팔린다. 그러나 무엇을 팔지를 정해야 사람을 어떻게 모을지가 정해진다. 그래서 <em>설계는 뒤에서 앞으로</em>, <em>실행은 앞에서 뒤로</em>.</p>
      </div>

      <h2>1. 두 가지 콘텐츠 유형</h2>
      <p>강의의 출발점은 콘텐츠를 두 종류로 구분하는 것이다. 시청자의 의도(목적) 유무가 기준이다.</p>
      <div class="cards-grid">

            유튜브 트래픽의 약 80% 이상이 홈화면에서 시작된다.

        </div>

            "그 주제를 알고 싶은" 사람이 직접 찾아옴.
          </div>
        </div>

      <h2>2. 기획 순서 vs 제작 순서 — 방향이 정반대</h2>
      <p>같은 세 단계지만 방향이 다르다. 이 비대칭이 이번 강의의 핵심 프레임이다.</p>

      <div class="info-card">
        <h3>WHY?</h3>

      <h2>4. 매출 공식과 깔때기</h2>
      <p>"성공하는 채널은 업로드하는 목적이 있다." 그 목적을 숫자로 환산한 것이 바로 이 공식이다.</p>

      <h2>5. 기획의 역방향 — 매출에서 시작하는 5단계</h2>
      <p>매출 공식과 깔때기를 결합하면, 모든 콘텐츠 기획은 다음과 같은 역산 흐름으로 정리된다.</p>
      <ol>
        <li><strong>수익화 목표 설정</strong> — 예: 월 매출 3,000만원</li>
        <li><strong>판매 수량 역산</strong> — Q = 매출 ÷ P → 10만원 객단가라면 Q = 10</li>

        <li><strong>키 콘텐츠 조회수 역산</strong> — 랜딩 전환율 10% → 200회 필요</li>

      <h2>7. 전체 흐름 한 장으로</h2>
      <p>마지막으로 <strong>설계 방향과 실행 방향</strong>을 같은 그림에 겹쳐보면 이번 강의 전체가 한눈에 들어온다.</p>

      <h1>비즈니스PT 1강 · 전체 종합 정리</h1>
      <p class="lead">
        1-4강 / 1-5강 및 4.12·4.16 필사 노트를 강 구분 없이 하나로 통합.

      <h2>§1. 콘텐츠의 두 유형</h2>
      <p>모든 기획의 출발점. 시청자의 <strong>의도(목적) 유무</strong>가 기준이다.</p>

      <h2>§2. 기획 vs 제작 — 방향이 정반대</h2>

      <h2>§3. 수익화 구조 — 고객 4단계</h2>
      <p>"수익화"는 한 덩어리가 아니다. 깔때기를 통과한 사람들은 4단계로 나뉘며, 단계마다 다른 전환 전략이 필요.</p>

      <h2>§4. 매출 공식과 가능한 숫자</h2>
      <div class="key-card">
        <h3>매출 공식</h3>
        <p style="font-size: 18px; font-family: var(--font-mono); color: var(--text-0); margin: 8px 0;">
          매출 = P (가격) × Q (수량)
        </p>
        <p style="margin-top: 12px;">역산: <strong>목표 매출 ÷ P(객단가) = Q(수량)</strong></p>
        <p style="margin-top: 6px;">예) <strong>3,000만원 = 10만원 × 10개</strong></p>
      </div>
      <div class="warn-card">

        <p>★ <strong>내가 팔 수 있는 가격과 숫자(= 가능한 숫자)를 알아야 판단이 가능하다.</strong> P·Q가 막연한 채 기획하면 모든 계산이 허상. 가능한 P 범위와 현실적 Q 상한을 먼저 확정해야 한다.</p>
      </div>

      <h2>§5. 깔때기와 트래픽 계산</h2>

      <h2>§6. 트래픽의 세 관점 — 비 · 농경 · 댐</h2>
      <p>트래픽을 단순히 "많이 들어오는 것"으로 보지 않고, <strong>관점 3가지</strong>로 쪼개서 이해한다. (4.16 필사 노트 신규 개념)</p>

      <h2>§7. 영상 단위 KPI (정량)</h2>
      <p>영상 1개가 깔때기 입구로 작동하기 위해 충족해야 할 네 가지 지표.</p>

      <h2>§8. 아이템 4요소와 소비자 의사결정</h2>
      <p>아이템은 4개 속성의 조합으로 소비자의 의사결정을 결정한다. (4.16 필사 노트)</p>
      <table>

          <tr><td><strong>가격</strong></td><td>지불 의향 범위</td><td>가격대별 라인업</td></tr>

          <tr><td><strong>정보</strong></td><td>결정 근거 자료</td><td>리뷰·스펙·추천 맥락</td></tr>

      <h2>§9. 시청 → 구매 6단계 플로우 · 병목 분석</h2>
      <p>최종 전환까지의 여정은 6단계로 쪼개진다. (4.16 필사 노트)</p>
      <div class="flow-chain">
        <div class="flow-chain__step flow-chain__step--first">썸네일</div>
        <span class="flow-chain__arrow">→</span>
        <div class="flow-chain__step">영상</div>
        <span class="flow-chain__arrow">→</span>
        <div class="flow-chain__step">내용</div>
        <span class="flow-chain__arrow">→</span>
        <div class="flow-chain__step">댓글</div>
        <span class="flow-chain__arrow">→</span>
        <div class="flow-chain__step">랜딩페이지</div>
        <span class="flow-chain__arrow">→</span>

        <p style="margin-top: 8px; font-size: 13px;"><strong>전환율의 본질</strong>: 모집된 대비 다음 단계로 넘어간 비율. 각 단계마다 다른 전환율이 있고, 이를 <em>비틀어</em>(조정) 개선한다.</p>

      <h2>§10. 광고 유형 (프리롤 · 미드롤 · 엔드롤)</h2>

      <h2>§11. 주제 × 채널 매핑</h2>
      <p>유튜브 알고리즘은 <strong>주제 기반</strong>으로 채널을 분류·추천한다. (4.12 필사 노트)</p>
      <div class="info-card">

        <p>주제를 축(Y)으로, 채널을 축(X)으로 놓고 매핑하면 — <strong>주제가 명확할수록 채널 분류가 깨끗</strong>해지고, 그 결과 <em>디테일한 주제의 영상</em>이 홈 추천에 올라간다.</p>

                    │     ● 디테일 주제 2
                    │
   ─────────────────┼───────────────────► X축: 채널
                    │</code></pre>
      <p>= 주제 기반으로 채널 구분 → <strong>홍보 효율 상승</strong> → 디테일한 주제에서 홈 추천으로 노출.</p>

      <h2>§13. 개인 역량 Self-assessment</h2>
      <div class="warn-card">
        <h3>강의 외 본인 메모</h3>
        <p>4.12 필사 노트에는 사용자 본인의 역량 자평이 함께 기록돼 있음. <em>강의 콘텐츠가 아닌 자기 진단</em>이지만, 콘텐츠 제작 전략(글쓰기 vs 말하기 비중, 영상 형식 선택 등)의 근거가 되므로 함께 기록.</p>

    // 페이지별 초기화 훅 — 템플릿 삽입 후 호출됨
    const pageInits = {};

    const $ = (s, r = document) => r.querySelector(s);
    const $$ = (s, r = document) => [...r.querySelectorAll(s)];

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[c]));
    }
    function escapeRegExp(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }

    function renderNav() {
      const nav = $("#nav");
      nav.innerHTML = TOC.sections.map(section => {
        const items = section.items.length
          ? section.items.map(item =>
              `<a class="nav__item" href="#${item.id}" data-id="${item.id}">${escapeHtml(item.title)}</a>`
            ).join("")
          : `<div class="nav__item" style="color: var(--text-3); font-style: italic; cursor: default;">자료 준비 중...</div>`;
        return `<div class="nav__section">
          <div class="nav__heading">${escapeHtml(section.heading)}</div>
          ${items}
        </div>`;
      }).join("");
      $("#lastUpdated").textContent = TOC.lastUpdated;

      $$(".nav__item[data-id]").forEach(el => {
        el.addEventListener("click", e => {
          e.preventDefault();
          navigate(el.dataset.id);
          if (window.innerWidth <= 900) $("#sidebar").classList.remove("is-open");
        });
      });
    }

    function findItem(id) {
      for (const s of TOC.sections)
        for (const it of s.items)
          if (it.id === id) return { section: s, item: it };
      return null;
    }

    function navigate(id) {
      const match = findItem(id) || findItem("home");
      if (!match) return;

      $$(".nav__item").forEach(el => el.classList.remove("is-active"));
      const activeEl = $(`.nav__item[data-id="${match.item.id}"]`);
      if (activeEl) activeEl.classList.add("is-active");

      $("#breadcrumb").innerHTML =
        `${escapeHtml(match.section.heading)} <span style="color: var(--text-3); margin: 0 6px;">›</span> ` +
        `<strong>${escapeHtml(match.item.title)}</strong>`;

      if (location.hash !== `#${match.item.id}`)
        history.replaceState(null, "", `#${match.item.id}`);

      const content = $("#content");
      if (match.item.tpl) {
        const tpl = document.getElementById(match.item.tpl);
        if (tpl) {
          content.innerHTML = "";
          content.appendChild(tpl.content.cloneNode(true));
          window.scrollTo({ top: 0, behavior: "instant" });
          // 페이지별 초기화 (인터랙티브 요소가 있는 템플릿)
          const init = pageInits[match.item.tpl];
          if (typeof init === "function") {
            try { init(); } catch (e) { console.error("페이지 init 오류:", e); }
          }
        } else {
          content.innerHTML = `<div class="warn-card"><h3>템플릿 누락</h3><p>${escapeHtml(match.item.tpl)}</p></div>`;
        }
      } else {
        content.innerHTML = homeHtml();
      }
    }

      const sectionCards = (heading) => {
        const sec = TOC.sections.find(s => s.heading === heading);
        if (!sec || !sec.items.length) return "";
        return `<div class="cards-grid">${sec.items.map(it =>
          `<a class="card" href="#${it.id}" onclick="event.preventDefault(); navigate('${it.id}');">
            <div class="card__title">${escapeHtml(it.title)}</div>
            <div class="card__desc">자세히 보기 →</div>
          </a>`).join("")}</div>`;
      };

      return `<article class="placeholder">

            <li>상단 <strong>검색창</strong>에서 키워드로 현재 페이지 내용을 빠르게 필터링할 수 있습니다.</li>
            <li>이 페이지는 <strong>서버 없이 더블클릭만으로</strong> 실행됩니다 — 모든 콘텐츠가 단일 파일에 임베드되어 있습니다.</li>
            <li>처음 오셨다면 <a href="#my-framework" onclick="event.preventDefault(); navigate('my-framework');"><strong>내 관점의 전체 프레임</strong></a>부터 보시는 걸 권합니다.</li>
          </ul>
        </div>
      </article>`;
    }

    function setupSearch() {
      $("#searchInput").addEventListener("input", e => {
        const q = e.target.value.trim();
        clearHighlights();
        if (q.length >= 2) highlightInContent(q);
      });
    }
    function clearHighlights() {
      $$(".search-hit").forEach(el => {
        const p = el.parentNode;
        p.replaceChild(document.createTextNode(el.textContent), el);
        p.normalize();
      });
    }
    function highlightInContent(query) {
      const root = $("#content");
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
        acceptNode: n => {
          if (!n.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
          if (n.parentElement.closest("script, style")) return NodeFilter.FILTER_REJECT;
          return NodeFilter.FILTER_ACCEPT;
        },
      });
      const nodes = []; while (walker.nextNode()) nodes.push(walker.currentNode);
      const re = new RegExp(escapeRegExp(query), "gi");
      nodes.forEach(node => {
        const text = node.nodeValue;
        if (!re.test(text)) return; re.lastIndex = 0;
        const frag = document.createDocumentFragment();
        let last = 0, m;
        while ((m = re.exec(text)) !== null) {
          if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
          const mark = document.createElement("span");
          mark.className = "search-hit"; mark.textContent = m[0];
          frag.appendChild(mark);
          last = m.index + m[0].length;
        }
        if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
        node.parentNode.replaceChild(frag, node);
      });
    }

    function setupSidebarToggle() {
      $("#menuToggle").addEventListener("click", () => $("#sidebar").classList.toggle("is-open"));
      $("#sidebarToggle").addEventListener("click", () => $("#sidebar").classList.remove("is-open"));
    }

    // ============================================
    // 트래픽 계산기 초기화 로직
    // ============================================
    pageInits["tpl-traffic-calculator"] = () => {
      const g = id => document.getElementById(id);
      const STORAGE_KEY = "bizpt_traffic_scenarios_v1";
      const DRAFT_KEY = "bizpt_traffic_draft_v1";
      const SORT_KEY = "bizpt_traffic_sort_v1";
      const DEFAULTS = {
        revenue: 30000000, aov: 100000,
        paidRate: 5, clickRate: 5, keyRate: 20,
        viewsPerVid: 1000, memo: ""
      };
      const PRESETS = {
        "1-5": { paidRate: 5, clickRate: 5, keyRate: 20, label: "1-5강 목표" },
        "1-4": { paidRate: 50, clickRate: 10, keyRate: 10, label: "1-4강 예시" },
      };
      let sortMode = localStorage.getItem(SORT_KEY) || "recent"; // recent | name

      function readInputs() {
        return {
          name: g("tc-name").value.trim(),
          revenue: +g("tc-revenue").value || 0,
          aov: +g("tc-aov").value || 0,
          paidRate: +g("tc-paid-rate").value || 0,
          clickRate: +g("tc-click-rate").value || 0,
          keyRate: +g("tc-key-rate").value || 0,
          viewsPerVid: +g("tc-views").value || 0,
          memo: g("tc-memo").value,
        };
      }

      function setInputs(v) {
        if (v.name !== undefined) g("tc-name").value = v.name || "";
        g("tc-revenue").value = v.revenue ?? DEFAULTS.revenue;
        g("tc-aov").value = v.aov ?? DEFAULTS.aov;
        g("tc-paid-rate").value = v.paidRate ?? DEFAULTS.paidRate;
        g("tc-click-rate").value = v.clickRate ?? DEFAULTS.clickRate;
        g("tc-key-rate").value = v.keyRate ?? DEFAULTS.keyRate;
        g("tc-views").value = v.viewsPerVid ?? DEFAULTS.viewsPerVid;
        g("tc-memo").value = v.memo ?? "";
      }

      function fmt(n) {
        if (!isFinite(n) || isNaN(n)) return "—";
        return Math.ceil(n).toLocaleString("ko-KR");
      }

      function calc() {
        const v = readInputs();
        const q = v.aov > 0 ? v.revenue / v.aov : 0;
        const landing = v.paidRate > 0 ? q / (v.paidRate / 100) : 0;
        const keyViews = v.clickRate > 0 ? landing / (v.clickRate / 100) : 0;
        const pullingViews = v.keyRate > 0 ? keyViews / (v.keyRate / 100) : 0;
        const videoCount = v.viewsPerVid > 0 ? pullingViews / v.viewsPerVid : 0;
        g("tc-q").textContent = fmt(q);
        g("tc-landing").textContent = fmt(landing);
        g("tc-key").textContent = fmt(keyViews);
        g("tc-pulling").textContent = fmt(pullingViews);
        g("tc-videos").textContent = fmt(videoCount);
      }

      // Storage helpers
      function loadAll() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
        catch (e) { return []; }
      }
      function saveAll(list) {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); return true; }
        catch (e) { alert("저장 실패: " + e.message); return false; }
      }
      function saveDraft() {
        try {
          const v = readInputs();
          localStorage.setItem(DRAFT_KEY, JSON.stringify({ ...v, ts: Date.now() }));
          const el = g("tc-draft-status");
          if (el) {
            el.textContent = "초안 자동 저장됨";
            clearTimeout(saveDraft._t);
            saveDraft._t = setTimeout(() => { el.textContent = ""; }, 1600);
          }
        } catch (e) {}
      }
      function loadDraft() {
        try { return JSON.parse(localStorage.getItem(DRAFT_KEY) || "null"); }
        catch (e) { return null; }
      }

      // Sorted list
      function getSortedList() {
        const list = loadAll();
        const sorted = [...list];
        if (sortMode === "name") {
          sorted.sort((a, b) => (a.name || "").localeCompare(b.name || "", "ko"));
        } else {
          sorted.sort((a, b) => new Date(b.savedAt || 0) - new Date(a.savedAt || 0));
        }
        return { sorted, originalList: list };
      }

      function renderList() {
        const { sorted, originalList } = getSortedList();
        const box = g("tc-list");
        g("tc-count").textContent = originalList.length ? `· ${originalList.length}개` : "";

        // Update sort button active states
        document.querySelectorAll(".tc-sort-btn").forEach(b => {
          b.classList.toggle("is-active", b.dataset.sort === sortMode);
        });

        if (!sorted.length) {
          box.innerHTML = `<div class="tc-empty">저장된 시나리오가 없습니다. 입력값을 채우고 <strong>현재 시나리오 저장</strong>을 눌러 보세요.</div>`;
          return;
        }

        box.innerHTML = sorted.map((s) => {
          const origIdx = originalList.findIndex(x => x.name === s.name);
          const date = s.savedAt ? new Date(s.savedAt).toLocaleString("ko-KR", { year: "2-digit", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" }) : "";
          const revenueKor = ((s.revenue || 0) / 10000).toLocaleString("ko-KR") + "만원";
          const memoHtml = s.memo ? `<div class="tc-scenario__memo">${escapeHtml(s.memo)}</div>` : "";
          return `<div class="tc-scenario" data-i="${origIdx}">
            <div class="tc-scenario__name">${escapeHtml(s.name)}</div>
            <div class="tc-scenario__meta">매출 ${revenueKor}</div>
            <div class="tc-scenario__meta">${escapeHtml(date)}</div>
            <button class="tc-scenario__btn" data-act="load" data-i="${origIdx}">불러오기</button>
            <button class="tc-scenario__btn" data-act="dup" data-i="${origIdx}">복제</button>
            <button class="tc-scenario__btn tc-scenario__btn--del" data-act="del" data-i="${origIdx}">삭제</button>
            ${memoHtml}
          </div>`;
        }).join("");

        box.querySelectorAll("button[data-act]").forEach(btn => {
          btn.addEventListener("click", () => {
            const idx = +btn.dataset.i;
            const act = btn.dataset.act;
            const list = loadAll();
            if (act === "load") {
              const s = list[idx];
              if (s) { setInputs(s); calc(); saveDraft(); window.scrollTo({ top: 0, behavior: "smooth" }); }
            } else if (act === "dup") {
              const s = list[idx];
              if (!s) return;
              let newName = s.name + " (복사)";
              let n = 2;
              while (list.some(x => x.name === newName)) { newName = s.name + ` (복사 ${n++})`; }
              const copy = { ...s, name: newName, savedAt: new Date().toISOString() };
              list.push(copy);
              saveAll(list); renderList();
            } else if (act === "del") {
              if (!confirm(`"${list[idx].name}" 시나리오를 삭제할까요?`)) return;
              list.splice(idx, 1);
              saveAll(list); renderList();
            }
          });
        });
      }

      // 이벤트 바인딩 — 입력 변경 시 자동 계산 + 자동 저장 (초안)
      ["tc-revenue","tc-aov","tc-paid-rate","tc-click-rate","tc-key-rate","tc-views"].forEach(id => {
        g(id).addEventListener("input", () => { calc(); saveDraft(); });
      });
      ["tc-name","tc-memo"].forEach(id => {
        g(id).addEventListener("input", saveDraft);
      });

      // 프리셋 버튼 (전환율 3개만 변경)
      document.querySelectorAll("button[data-preset]").forEach(btn => {
        btn.addEventListener("click", () => {
          const p = PRESETS[btn.dataset.preset];
          if (!p) return;
          g("tc-paid-rate").value = p.paidRate;
          g("tc-click-rate").value = p.clickRate;
          g("tc-key-rate").value = p.keyRate;
          calc(); saveDraft();
        });
      });

      // 정렬 토글
      document.querySelectorAll(".tc-sort-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          sortMode = btn.dataset.sort;
          localStorage.setItem(SORT_KEY, sortMode);
          renderList();
        });
      });

      g("tc-save").addEventListener("click", () => {
        const v = readInputs();
        if (!v.name) { alert("시나리오 이름을 입력하세요."); g("tc-name").focus(); return; }
        if (v.aov <= 0) { alert("객단가는 0보다 커야 합니다."); return; }
        const list = loadAll();
        const existing = list.findIndex(s => s.name === v.name);
        const entry = { ...v, savedAt: new Date().toISOString() };
        if (existing >= 0) {
          if (!confirm(`"${v.name}" 이름의 시나리오가 이미 있습니다. 덮어쓸까요?`)) return;
          list[existing] = entry;
        } else {
          list.push(entry);
        }
        saveAll(list); renderList();
        g("tc-draft-status").textContent = "저장 완료";
        setTimeout(() => { g("tc-draft-status").textContent = ""; }, 2000);
      });

      g("tc-reset").addEventListener("click", () => {
        if (!confirm("입력값을 기본값으로 초기화할까요? (저장된 시나리오는 유지됨)")) return;
        setInputs({ name: "", ...DEFAULTS });
        calc(); saveDraft();
      });

      g("tc-export").addEventListener("click", () => {
        const list = loadAll();
        if (!list.length) { alert("내보낼 시나리오가 없습니다."); return; }
        const blob = new Blob([JSON.stringify(list, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        const stamp = new Date().toISOString().slice(0,10);
        a.href = url; a.download = `bizpt-traffic-scenarios-${stamp}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
      });

      g("tc-import").addEventListener("change", e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            const data = JSON.parse(ev.target.result);
            if (!Array.isArray(data)) throw new Error("배열이 아닙니다");
            const existing = loadAll();
            const merged = [...existing];
            let added = 0, updated = 0;
            data.forEach(s => {
              if (!s.name) return;
              const i = merged.findIndex(x => x.name === s.name);
              if (i >= 0) { merged[i] = s; updated++; }
              else { merged.push(s); added++; }
            });
            saveAll(merged); renderList();
            alert(`불러오기 완료 — 추가 ${added}, 갱신 ${updated}`);
          } catch (err) {
            alert("JSON 파싱 실패: " + err.message);
          }
          e.target.value = "";
        };
        reader.readAsText(file);
      });

      g("tc-clear-all").addEventListener("click", () => {
        const list = loadAll();
        if (!list.length) { alert("삭제할 시나리오가 없습니다."); return; }
        if (!confirm(`저장된 ${list.length}개 시나리오를 모두 삭제할까요? (되돌릴 수 없음)`)) return;
        saveAll([]); renderList();
      });

      // 페이지 진입 시 초안 복원
      const draft = loadDraft();
      if (draft && Object.keys(draft).length > 1) {
        setInputs(draft);
        const draftEl = g("tc-draft-status");
        if (draftEl) {
          draftEl.textContent = "이전 작업 복원됨";
          setTimeout(() => { draftEl.textContent = ""; }, 2500);
        }
      }

      // 초기 계산 + 목록 렌더
      calc();
      renderList();
    };

    window.navigate = navigate;

    document.addEventListener("DOMContentLoaded", () => {
      renderNav();
      setupSidebarToggle();
      setupSearch();
      const hash = location.hash.replace("#", "") || "home";
      navigate(hash);
      window.addEventListener("hashchange", () => {
        navigate(location.hash.replace("#", "") || "home");
      });
    });
  </script>
</body>
